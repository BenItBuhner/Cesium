name: Mobile Android CI

on:
  pull_request:
    paths:
      - "apps/mobile/**"
      - "packages/client/**"
      - "packages/core/**"
      - "packages/design/**"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/mobile-android-ci.yml"
  workflow_dispatch:

concurrency:
  group: mobile-android-ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

jobs:
  build:
    name: Build debug APKs
    runs-on: ubuntu-latest
    timeout-minutes: 35
    env:
      GRADLE_OPTS: -Dorg.gradle.workers.max=4 -Dkotlin.daemon.jvm.options=-Xmx2048m
      NPM_CONFIG_AUDIT: "false"
      NPM_CONFIG_FUND: "false"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.19.0
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Gradle cache
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: false
          cache-cleanup: on-success

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android toolchain and mobile dependencies
        run: |
          status=0
          (
            yes | sdkmanager --licenses >/dev/null
            sdkmanager "ndk;27.0.12077973" "cmake;3.31.6"
          ) & android_pid=$!
          npm ci \
            --include-workspace-root=false \
            --workspace @cesium/mobile \
            --workspace @cesium/desktop-renderer \
            --workspace @cesium/core \
            --workspace @cesium/design \
            --workspace @cesium/client \
            --workspace @cesium/config \
            --workspace @cesium/ui-web & npm_pid=$!
          wait "$android_pid" || status=1
          wait "$npm_pid" || status=1
          exit "$status"

      - name: Build required shared packages
        run: |
          status=0
          npm run build --workspace @cesium/core & core_pid=$!
          npm run build --workspace @cesium/design & design_pid=$!
          wait "$core_pid" || status=1
          wait "$design_pid" || status=1
          exit "$status"

      - name: Validate mobile app
        run: |
          status=0
          npm run typecheck --workspace @cesium/mobile & typecheck_pid=$!
          npm run test --workspace @cesium/mobile & test_pid=$!
          wait "$typecheck_pid" || status=1
          wait "$test_pid" || status=1
          exit "$status"

      - name: Prepare Vite and React Native assets
        working-directory: apps/mobile
        run: npm run prepare:android

      - name: Build Android debug APKs
        working-directory: apps/mobile
        env:
          ORG_GRADLE_PROJECT_reactNativeArchitectures: arm64-v8a
        run: node scripts/run-gradle.mjs --parallel --build-cache :app:assembleDebug :wear:assembleDebug

      - name: Prepare APK artifacts
        run: |
          mkdir -p dist/mobile-android
          cp apps/mobile/android/app/build/outputs/apk/debug/app-debug.apk \
            dist/mobile-android/cesium-mobile-${{ github.event.pull_request.number || 'manual' }}-debug.apk
          cp apps/mobile/android/wear/build/outputs/apk/debug/wear-debug.apk \
            dist/mobile-android/cesium-wear-${{ github.event.pull_request.number || 'manual' }}-debug.apk

      - name: Upload APK artifacts
        uses: actions/upload-artifact@v4
        with:
          name: cesium-mobile-apks
          path: dist/mobile-android/*.apk
          if-no-files-found: error
          retention-days: 14

      - name: Comment on pull request
        if: github.event_name == 'pull_request'
        uses: thollander/actions-comment-pull-request@v3
        with:
          comment-tag: mobile-android-build
          message: |
            ## Cesium Mobile Android build

            Debug APKs are ready for install and PR verification.

            CI builds a single `arm64-v8a` ABI to keep runner disk usage manageable.

            | App | Artifact |
            | --- | --- |
            | Phone | `cesium-mobile-${{ github.event.pull_request.number }}-debug.apk` |
            | Wear OS | `cesium-wear-${{ github.event.pull_request.number }}-debug.apk` |

            Download both from the **cesium-mobile-apks** artifact on [this workflow run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}).

            Install the phone APK with:

            ```bash
            adb install -r cesium-mobile-${{ github.event.pull_request.number }}-debug.apk
            ```
