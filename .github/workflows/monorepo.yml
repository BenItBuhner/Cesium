name: Lightweight CI

on:
  pull_request:
    paths-ignore:
      - ".docker/**"
      - "**/*.tsbuildinfo"
      - "**/.next/**"
      - "**/dist/**"
      - "**/out/**"
  push:
    branches:
      - main
    paths-ignore:
      - ".docker/**"
      - "**/*.tsbuildinfo"
      - "**/.next/**"
      - "**/dist/**"
      - "**/out/**"

concurrency:
  group: lightweight-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      CI: true
      ENABLE_NEXT_PWA: "0"
      NEXT_TELEMETRY_DISABLED: "1"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install workspace dependencies
        run: npm ci --workspaces --include-workspace-root

      - name: Build shared packages
        run: npm run build:packages

      - name: Run focused tests
        run: npm test

      - name: Build API server
        run: npm --prefix server run build

      - name: Build web app
        run: npm run build --workspace @cesium/web
