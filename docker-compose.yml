services:
  postgres:
    image: postgres:16-alpine
    container_name: opencursor-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: opencursor
      POSTGRES_USER: opencursor
      POSTGRES_PASSWORD: opencursor
    ports:
      - "5433:5432"
    volumes:
      - ./.docker/pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U opencursor -d opencursor"]
      interval: 5s
      timeout: 5s
      retries: 20

  redis:
    image: redis:7-alpine
    container_name: opencursor-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6380:6379"
    volumes:
      - ./.docker/redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

  adminer:
    image: adminer:latest
    container_name: opencursor-adminer
    restart: unless-stopped
    ports:
      - "8081:8080"
    depends_on:
      postgres:
        condition: service_healthy
